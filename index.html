<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Secagem Pro | Timer Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b0f;
            --bg-card: #12141a;
            --bg-elevated: #1a1c24;
            --bg-input: #0d0e13;
            --fg: #e8eaf0;
            --fg-muted: #7a7f8c;
            --fg-dim: #454754;
            --accent: #f97316;
            --accent-soft: rgba(249, 115, 22, 0.12);
            --success: #22c55e;
            --success-soft: rgba(34, 197, 94, 0.12);
            --info: #06b6d4;
            --info-soft: rgba(6, 182, 212, 0.12);
            --border: rgba(255, 255, 255, 0.06);
            --border-accent: rgba(249, 115, 22, 0.25);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --radius-full: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            padding: 12px;
            display: flex; align-items: flex-start; justify-content: center;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(249, 115, 22, 0.08) 0%, transparent 60%);
            pointer-events: none; z-index: 0;
        }

        .card {
            width: 100%; max-width: 500px; position: relative; z-index: 1;
            background: var(--bg-card); border-radius: var(--radius-lg);
            border: 1px solid var(--border); overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
        }

        /* Header */
        .card-header {
            background: var(--bg-elevated); padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            gap: 8px;
        }

        .title-section h1 {
            font-size: 1.1rem; font-weight: 700; color: var(--fg);
            display: flex; align-items: center; gap: 8px;
        }

        .logo-icon {
            width: 26px; height: 26px;
            background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .logo-icon svg { width: 14px; height: 14px; color: white; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-icon {
            background: transparent; border: 1px solid var(--border);
            color: var(--fg-muted); width: 32px; height: 32px;
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-icon:hover { background: var(--bg-input); color: var(--fg); }
        .btn-icon svg { width: 16px; height: 16px; }

        .btn-toggle-config {
            background: transparent; border: 1px solid var(--border);
            color: var(--fg-muted); font-family: inherit;
            font-size: 0.7rem; font-weight: 600; padding: 6px 10px;
            border-radius: var(--radius-full); cursor: pointer;
            display: flex; align-items: center; gap: 4px;
            white-space: nowrap;
        }
        .btn-toggle-config svg { width: 14px; height: 14px; transition: transform 0.2s; }
        .btn-toggle-config.active svg { transform: rotate(180deg); }

        /* Presets */
        .preset-bar {
            display: grid; 
            grid-template-columns: repeat(3, 1fr);
            gap: 8px; 
            padding: 16px 12px 0;
        }

        .preset-btn {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 12px 4px;
            font-family: inherit; font-weight: 600; color: var(--fg);
            cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 6px;
            transition: all 0.2s ease-out;
        }
        .preset-btn:active { background: var(--bg-elevated); }

        /* NOVO: Estado Ativo do Preset */
        .preset-btn.active {
            border-color: var(--accent);
            border-width: 2px;
            background: rgba(249, 115, 22, 0.05);
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.1);
        }

        .preset-icon {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .preset-btn.light .preset-icon { background: var(--success-soft); color: var(--success); }
        .preset-btn.medium .preset-icon { background: var(--info-soft); color: var(--info); }
        .preset-btn.heavy .preset-icon { background: var(--accent-soft); color: var(--accent); }
        
        .preset-icon svg { width: 16px; height: 16px; }

        .preset-text { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .preset-label { font-weight: 700; font-size: 0.75rem; }
        .preset-meta { font-size: 0.6rem; color: var(--fg-muted); font-weight: 400; margin-top: 1px; }

        /* Content */
        .card-content { padding: 0 16px 16px; }

        /* Controle Principal */
        .control-bar {
            margin-top: 16px; display: flex; gap: 10px; align-items: center;
        }
        .time-input-wrapper { flex: 1; position: relative; }
        .time-input-wrapper input {
            width: 100%; background: var(--bg-input);
            /* ALTERADO: Borda branca mais visível por padrão */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md); padding: 14px;
            font-family: 'JetBrains Mono', monospace; font-size: 1.2rem;
            font-weight: 700; color: var(--fg); outline: none; text-align: center;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }
        .time-input-wrapper input:focus { border-color: var(--accent); }

        .btn-start {
            background: linear-gradient(135deg, var(--accent) 0%, #ea580c 100%);
            border: none; color: white; font-family: inherit;
            padding: 14px 20px; border-radius: var(--radius-md);
            font-weight: 700; font-size: 0.85rem; cursor: pointer;
            white-space: nowrap; display: flex; align-items: center;
            justify-content: center; gap: 6px;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25);
        }
        .btn-start:active { transform: scale(0.98); }
        .btn-start svg { width: 16px; height: 16px; }

        @media (max-width: 360px) {
            .btn-start span { display: none; }
            .btn-start { padding: 14px; }
            .title-section h1 { font-size: 1rem; }
        }

        /* Config Panel */
        .config-panel {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
            margin-top: 0;
        }
        .config-panel.visible {
            max-height: 600px; opacity: 1; margin-top: 16px;
        }

        .param-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

        .param-card {
            background: var(--bg-input); border-radius: var(--radius-md);
            padding: 14px; border: 1px solid var(--border);
        }

        .param-title {
            font-size: 0.65rem; text-transform: uppercase; font-weight: 700;
            letter-spacing: 0.08em; color: var(--fg-muted); margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .param-title svg { width: 12px; height: 12px; }

        .time-row {
            display: flex; align-items: center; gap: 4px;
            background: var(--bg-deep); border-radius: var(--radius-sm);
            padding: 4px 10px; margin-bottom: 6px; border: 1px solid var(--border);
        }
        .time-row input {
            background: transparent; border: none; padding: 8px 0;
            width: 32px; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 0.9rem;
            font-weight: 600; color: var(--fg); outline: none;
        }
        .time-row label { color: var(--fg-dim); font-size: 0.65rem; }
        .time-row .status-badge {
            margin-left: auto; font-size: 0.55rem; font-weight: 700;
            padding: 2px 6px; border-radius: 4px;
        }
        .status-badge.on { background: rgba(34, 197, 94, 0.15); color: var(--success); }
        .status-badge.off { background: rgba(255, 255, 255, 0.1); color: var(--fg-muted); }

        .full-input-wrap { margin-top: 8px; }
        .full-input-wrap label { display: block; font-size: 0.65rem; color: var(--fg-muted); margin-bottom: 4px; }
        .full-input {
            background: var(--bg-deep); border-radius: var(--radius-sm);
            border: 1px solid var(--border); padding: 10px; width: 100%;
            color: var(--fg); font-family: 'JetBrains Mono', monospace;
            font-weight: 500; text-align: center; outline: none; font-size: 0.9rem;
        }

        /* Resultado Principal */
        .result-main {
            background: linear-gradient(145deg, var(--bg-elevated) 0%, var(--bg-deep) 100%);
            border-radius: var(--radius-lg); padding: 20px 16px; text-align: center;
            margin-top: 20px; border: 1px solid rgba(34, 197, 94, 0.15);
        }
        .result-main-label {
            font-size: 0.65rem; letter-spacing: 0.1em; font-weight: 600;
            color: var(--success); text-transform: uppercase; margin-bottom: 8px;
        }
        .result-main-time {
            font-family: 'JetBrains Mono', monospace; font-size: 3.5rem;
            font-weight: 700; color: var(--success); line-height: 1; letter-spacing: -0.02em;
        }
        .result-main-time.finished { color: var(--accent); }

        .progress-bar-bg {
            background: var(--bg-deep); border-radius: var(--radius-full);
            height: 6px; width: 100%; margin-top: 16px; overflow: hidden;
        }
        .progress-fill {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, var(--accent), #f59e0b);
            border-radius: var(--radius-full); transition: width 0.3s linear;
        }

        /* Info Grid */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px;
        }
        .info-item {
            background: var(--bg-input); border-radius: var(--radius-md);
            padding: 12px 10px; text-align: center; border: 1px solid var(--border);
        }
        .info-label { font-size: 0.6rem; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
        .info-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.9rem; color: var(--fg); }
        .day-indicator { font-size: 0.6rem; color: var(--accent); margin-top: 2px; }

        @media (min-width: 500px) {
            .preset-bar { padding: 20px 24px 0; gap: 12px; }
            .preset-btn { padding: 14px 8px; }
            .preset-label { font-size: 0.85rem; }
            .preset-meta { font-size: 0.65rem; }
            
            .card-content { padding: 0 24px 24px; }
            .result-main { padding: 28px 20px; }
            .result-main-time { font-size: 4.5rem; }
            .param-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="title-section">
            <h1>
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/>
                    </svg>
                </div>
                Secagem PRO
            </h1>
        </div>
        
        <div class="header-actions">
            <button class="btn-icon" id="fullscreenBtn" aria-label="Tela Cheia">
                <svg id="iconExpand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                </svg>
                <svg id="iconCompress" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 14h6v6M20 10h-6V4M14 14l6 6M4 4l6 6"/>
                </svg>
            </button>
            <button class="btn-toggle-config active" id="toggleBtn" aria-expanded="true">
                Ajustes
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- Presets -->
    <div class="preset-bar">
        <!-- Adicionado parâmetro 'this' no onclick -->
        <button class="preset-btn light" onclick="aplicarPreset('leve', this)">
            <div class="preset-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a10 10 0 0 0-7.07 17.07l1.41-1.41A8 8 0 1 1 20 12h2a10 10 0 0 0-10-10z"/>
                    <circle cx="12" cy="12" r="2"/>
                </svg>
            </div>
            <div class="preset-text">
                <span class="preset-label">Leve</span>
                <span class="preset-meta">Ciclo: 1hs</span>
            </div>
        </button>
        
        <button class="preset-btn medium" onclick="aplicarPreset('medio', this)">
            <div class="preset-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </div>
            <div class="preset-text">
                <span class="preset-label">Médio</span>
                <span class="preset-meta">Ciclo: 2hs</span>
            </div>
        </button>
        
        <button class="preset-btn heavy" onclick="aplicarPreset('pesado', this)">
            <div class="preset-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
            </div>
            <div class="preset-text">
                <span class="preset-label">Pesado</span>
                <span class="preset-meta">Ciclo: 3hs</span>
            </div>
        </button>
    </div>

    <div class="card-content">
        
        <div class="control-bar">
            <div class="time-input-wrapper">
                <input type="time" id="horaInicio" step="1" aria-label="Horario de inicio">
            </div>
            <button class="btn-start" onclick="setarAgora()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                <span>Iniciar</span>
            </button>
        </div>

        <div id="configPanel" class="config-panel visible" role="region">
            <div class="param-grid">
                <div class="param-card">
                    <div class="param-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12c-2.5-2.5-2.5-6.5 0-9 2.5 2.5 2.5 6.5 0 9z"/></svg>
                        Pre-aquecimento
                    </div>
                    <div class="time-row">
                        <input type="number" id="preLigadoH" value="0" min="0" step="1">
                        <label>h</label>
                        <input type="number" id="preLigadoM" value="12" min="0" max="59" step="1">
                        <label>min</label>
                        <span class="status-badge on">ON</span>
                    </div>
                    <div class="time-row">
                        <input type="number" id="preDesligadoH" value="0" min="0" step="1">
                        <label>h</label>
                        <input type="number" id="preDesligadoM" value="1" min="0" max="59" step="1">
                        <label>min</label>
                        <span class="status-badge off">OFF</span>
                    </div>
                </div>

                <div class="param-card">
                    <div class="param-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        Ciclos de Secagem
                    </div>
                    <div class="time-row">
                        <input type="number" id="cicloLigadoH" value="0" min="0" step="1">
                        <label>h</label>
                        <input type="number" id="cicloLigadoM" value="6" min="0" max="59" step="1">
                        <label>min</label>
                        <span class="status-badge on">ON</span>
                    </div>
                    <div class="time-row">
                        <input type="number" id="cicloDesligadoH" value="0" min="0" step="1">
                        <label>h</label>
                        <input type="number" id="cicloDesligadoM" value="1" min="0" max="59" step="1">
                        <label>min</label>
                        <span class="status-badge off">OFF</span>
                    </div>
                    <div class="full-input-wrap">
                        <label for="qtdCiclos">Quantidade de ciclos</label>
                        <input type="number" id="qtdCiclos" value="10" min="1" step="1" class="full-input">
                    </div>
                </div>

                <div class="param-card" style="grid-column: 1 / -1;">
                    <div class="param-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5l-5 5-5-5M17 19l-5-5-5 5"/></svg>
                        Resfriamento Final
                    </div>
                    <div class="time-row">
                        <input type="number" id="resfriamentoH" value="0" min="0" step="1">
                        <label>h</label>
                        <input type="number" id="resfriamentoM" value="8" min="0" max="59" step="1">
                        <label>min</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="result-main">
            <div class="result-main-label">Tempo Restante</div>
            <div id="liveCountdown" class="result-main-time" aria-live="polite">--:--:--</div>
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill" role="progressbar"></div>
            </div>
        </div>

        <div class="info-grid">
            <div class="info-item">
                <div class="info-label">Termino</div>
                <div class="info-value" id="horarioFinal">--:--:--</div>
                <div id="dayIndicator" class="day-indicator"></div>
            </div>
            <div class="info-item">
                <div class="info-label">Ciclos Totais</div>
                <div class="info-value" id="displayCiclos">10</div>
            </div>
            <div class="info-item">
                <div class="info-label">Duracao Total</div>
                <div class="info-value" id="displayDuracao">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">Pre-aquec.</div>
                <div class="info-value" id="preheatTotal">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">Ciclos (soma)</div>
                <div class="info-value" id="cyclesTotal">--</div>
            </div>
            <div class="info-item">
                <div class="info-label">Resfriamento</div>
                <div class="info-value" id="coolingTotal">--</div>
            </div>
        </div>

    </div>
</div>

<script>
    // Initialize DOM references
    const preLigadoH = document.getElementById('preLigadoH');
    const preLigadoM = document.getElementById('preLigadoM');
    const preDesligadoH = document.getElementById('preDesligadoH');
    const preDesligadoM = document.getElementById('preDesligadoM');
    const cicloLigadoH = document.getElementById('cicloLigadoH');
    const cicloLigadoM = document.getElementById('cicloLigadoM');
    const cicloDesligadoH = document.getElementById('cicloDesligadoH');
    const cicloDesligadoM = document.getElementById('cicloDesligadoM');
    const qtdCiclos = document.getElementById('qtdCiclos');
    const resfriamentoH = document.getElementById('resfriamentoH');
    const resfriamentoM = document.getElementById('resfriamentoM');
    const horaInicio = document.getElementById('horaInicio');

    const displayCiclosSpan = document.getElementById('displayCiclos');
    const displayDuracaoSpan = document.getElementById('displayDuracao');
    const horarioFinalSpan = document.getElementById('horarioFinal');
    const dayIndicatorSpan = document.getElementById('dayIndicator');
    const liveCountdownSpan = document.getElementById('liveCountdown');
    const preheatTotalSpan = document.getElementById('preheatTotal');
    const cyclesTotalSpan = document.getElementById('cyclesTotal');
    const coolingTotalSpan = document.getElementById('coolingTotal');
    const progressFill = document.getElementById('progressFill');
    const configPanel = document.getElementById('configPanel');
    const toggleBtn = document.getElementById('toggleBtn');
    
    // Fullscreen elements
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const iconExpand = document.getElementById('iconExpand');
    const iconCompress = document.getElementById('iconCompress');

    // State
    let countdownInterval = null;
    let endDateCache = null;
    let totalDurationMs = 0;

    // Helpers
    function padTwo(n) { return String(n).padStart(2, '0'); }
    function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

    function getTotalMinutes(hoursElem, minutesElem) {
        const hrs = parseInt(hoursElem.value) || 0;
        let mins = parseInt(minutesElem.value) || 0;
        mins = clamp(mins, 0, 59);
        return Math.max(0, hrs * 60 + mins);
    }

    function formatDetailedMinutes(minTotal) {
        const h = Math.floor(minTotal / 60);
        const m = minTotal % 60;
        if (h === 0) return `${m} min`;
        if (m === 0) return `${h}h`;
        return `${h}h ${m}min`;
    }

    function formatSimple(minTotal) {
        const h = Math.floor(minTotal / 60);
        const m = minTotal % 60;
        if (h === 0) return `${m}min`;
        if (m === 0) return `${h}h`;
        return `${h}h${m}m`;
    }

    function validarMinutos() {
        const campos = [preLigadoM, preDesligadoM, cicloLigadoM, cicloDesligadoM, resfriamentoM];
        campos.forEach(campo => {
            if (!campo) return;
            campo.addEventListener('input', function() {
                let v = parseInt(this.value);
                if (isNaN(v)) return;
                this.value = clamp(v, 0, 59);
            });
        });
    }

    function salvarDados() {
        const config = {
            preLH: preLigadoH.value, preLM: preLigadoM.value,
            preDH: preDesligadoH.value, preDM: preDesligadoM.value,
            cicloLH: cicloLigadoH.value, cicloLM: cicloLigadoM.value,
            cicloDH: cicloDesligadoH.value, cicloDM: cicloDesligadoM.value,
            qtd: qtdCiclos.value,
            resH: resfriamentoH.value, resM: resfriamentoM.value,
            inicio: horaInicio.value,
            hidden: !configPanel.classList.contains('visible')
        };
        localStorage.setItem('secagemProConfig', JSON.stringify(config));
    }

    function carregarDados() {
        const saved = localStorage.getItem('secagemProConfig');
        if (!saved) return false;
        try {
            const cfg = JSON.parse(saved);
            if (cfg.preLH !== undefined) preLigadoH.value = cfg.preLH;
            if (cfg.preLM !== undefined) preLigadoM.value = cfg.preLM;
            if (cfg.preDH !== undefined) preDesligadoH.value = cfg.preDH;
            if (cfg.preDM !== undefined) preDesligadoM.value = cfg.preDM;
            if (cfg.cicloLH !== undefined) cicloLigadoH.value = cfg.cicloLH;
            if (cfg.cicloLM !== undefined) cicloLigadoM.value = cfg.cicloLM;
            if (cfg.cicloDH !== undefined) cicloDesligadoH.value = cfg.cicloDH;
            if (cfg.cicloDM !== undefined) cicloDesligadoM.value = cfg.cicloDM;
            if (cfg.qtd !== undefined) qtdCiclos.value = cfg.qtd;
            if (cfg.resH !== undefined) resfriamentoH.value = cfg.resH;
            if (cfg.resM !== undefined) resfriamentoM.value = cfg.resM;
            if (cfg.inicio !== undefined) horaInicio.value = cfg.inicio;

            if (cfg.hidden) {
                configPanel.classList.remove('visible');
                toggleBtn.classList.remove('active');
            } else {
                configPanel.classList.add('visible');
                toggleBtn.classList.add('active');
            }
            return true;
        } catch (e) { return false; }
    }

    function calcularTudo() {
        // Calcula durações
        const preLigMin = getTotalMinutes(preLigadoH, preLigadoM);
        const preDesMin = getTotalMinutes(preDesligadoH, preDesligadoM);
        const cicLigMin = getTotalMinutes(cicloLigadoH, cicloLigadoM);
        const cicDesMin = getTotalMinutes(cicloDesligadoH, cicloDesligadoM);
        const qtd = Math.max(1, parseInt(qtdCiclos.value) || 1);
        const resfMin = getTotalMinutes(resfriamentoH, resfriamentoM);

        const tempoPre = preLigMin + preDesMin;
        const tempoCiclosTotal = (cicLigMin + cicDesMin) * qtd;
        const tempoTotalMin = tempoPre + tempoCiclosTotal + resfMin;

        // Atualiza displays de informação
        displayCiclosSpan.innerText = qtd;
        displayDuracaoSpan.innerText = formatSimple(tempoTotalMin);
        preheatTotalSpan.innerText = formatDetailedMinutes(tempoPre);
        cyclesTotalSpan.innerText = formatDetailedMinutes(tempoCiclosTotal);
        coolingTotalSpan.innerText = formatDetailedMinutes(resfMin);

        totalDurationMs = tempoTotalMin * 60 * 1000;

        const startTimeStr = horaInicio.value;
        if (!startTimeStr) {
            horarioFinalSpan.innerText = "--:--:--";
            liveCountdownSpan.innerText = "--:--:--";
            dayIndicatorSpan.innerText = "";
            progressFill.style.width = "0%";
            if (countdownInterval) clearInterval(countdownInterval);
            salvarDados();
            return;
        }

        // Lógica de Data/Hora
        const parts = startTimeStr.split(':').map(Number);
        const hours = parts[0] || 0;
        const minutes = parts[1] || 0;
        const seconds = parts[2] || 0;

        const now = new Date();
        let startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, seconds);
        
        if (startDate < now) {
            const hypotheticalEnd = new Date(startDate.getTime() + totalDurationMs);
            if (hypotheticalEnd <= now) {
                startDate.setDate(startDate.getDate() + 1);
            } 
        }

        endDateCache = new Date(startDate.getTime() + totalDurationMs);

        const hF = padTwo(endDateCache.getHours());
        const mF = padTwo(endDateCache.getMinutes());
        const sF = padTwo(endDateCache.getSeconds());
        horarioFinalSpan.innerText = `${hF}:${mF}:${sF}`;

        const diffDays = Math.floor((endDateCache - startDate) / (1000 * 3600 * 24));
        if (diffDays > 0) {
            dayIndicatorSpan.innerText = `+${diffDays}d`;
        } else if (endDateCache.getDate() !== startDate.getDate()) {
            dayIndicatorSpan.innerText = "Vira dia";
        } else {
            dayIndicatorSpan.innerText = "";
        }

        iniciarContador();
        salvarDados();
    }

    function iniciarContador() {
        if (countdownInterval) clearInterval(countdownInterval);

        const tick = function() {
            if (!endDateCache) return;
            const now = new Date();
            let remaining = endDateCache - now;

            if (remaining <= 0) {
                liveCountdownSpan.innerText = "FINALIZADO";
                liveCountdownSpan.classList.add('finished');
                progressFill.style.width = "100%";
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }

            liveCountdownSpan.classList.remove('finished');
            const total = Math.max(1, totalDurationMs);
            let percent = ((total - remaining) / total) * 100;
            percent = clamp(percent, 0, 100);
            progressFill.style.width = `${percent}%`;

            const hours = Math.floor(remaining / (1000 * 3600));
            const minutes = Math.floor((remaining % 3600000) / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            liveCountdownSpan.innerText = `${padTwo(hours)}:${padTwo(minutes)}:${padTwo(seconds)}`;
        };

        tick();
        countdownInterval = setInterval(tick, 500);
    }

    function toggleConfigs() {
        const isVisible = configPanel.classList.toggle('visible');
        toggleBtn.classList.toggle('active', isVisible);
        salvarDados();
    }

    function setarAgora() {
        const agora = new Date();
        const h = padTwo(agora.getHours());
        const m = padTwo(agora.getMinutes());
        const s = padTwo(agora.getSeconds());
        horaInicio.value = `${h}:${m}:${s}`;
        calcularTudo();
    }

    /* --- LÓGICA DO PRESET COM INDICADOR VISUAL --- */
    
    // Função para limpar seleção de todos os botões
    function clearActivePresets() {
        document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
    }

    // Função modificar para receber o elemento clicado
    function aplicarPreset(tipo, element) {
        // 1. Limpa seleção anterior
        clearActivePresets();

        // 2. Adiciona classe ativa ao botão clicado
        if(element) element.classList.add('active');

        // 3. Aplica os valores
        if (tipo === 'leve') {
            preLigadoH.value = 0; preLigadoM.value = 10;
            preDesligadoH.value = 0; preDesligadoM.value = 1;
            cicloLigadoH.value = 0; cicloLigadoM.value = 6;
            cicloDesligadoH.value = 0; cicloDesligadoM.value = 1;
            qtdCiclos.value = 10;
            resfriamentoH.value = 0; resfriamentoM.value = 10;
        } else if (tipo === 'medio') {
            preLigadoH.value = 0; preLigadoM.value = 12;
            preDesligadoH.value = 0; preDesligadoM.value = 1;
            cicloLigadoH.value = 0; cicloLigadoM.value = 8;
            cicloDesligadoH.value = 0; cicloDesligadoM.value = 1;
            qtdCiclos.value = 15;
            resfriamentoH.value = 0; resfriamentoM.value = 10;
        } else if (tipo === 'pesado') {
            preLigadoH.value = 0; preLigadoM.value = 15;
            preDesligadoH.value = 0; preDesligadoM.value = 1;
            cicloLigadoH.value = 0; cicloLigadoM.value = 9;
            cicloDesligadoH.value = 0; cicloDesligadoM.value = 1;
            qtdCiclos.value = 20;
            resfriamentoH.value = 0; resfriamentoM.value = 15;
        }
        calcularTudo();
    }

    /* --- FUNÇÃO TELA CHEIA --- */
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Erro ao tentar tela cheia: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function updateFullscreenIcon() {
        if (document.fullscreenElement) {
            iconExpand.style.display = 'none';
            iconCompress.style.display = 'block';
        } else {
            iconExpand.style.display = 'block';
            iconCompress.style.display = 'none';
        }
    }

    // Event bindings
    toggleBtn.addEventListener('click', toggleConfigs);
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', updateFullscreenIcon);

    const allInputs = [
        preLigadoH, preLigadoM, preDesligadoH, preDesligadoM,
        cicloLigadoH, cicloLigadoM, cicloDesligadoH, cicloDesligadoM,
        qtdCiclos, resfriamentoH, resfriamentoM, horaInicio
    ];

    allInputs.forEach(function(inp) {
        if (inp) {
            inp.addEventListener('input', function() {
                // Se o usuário alterar manualmente, remove o destaque do preset
                // pois agora é uma configuração personalizada
                clearActivePresets();
                calcularTudo();
            });
            inp.addEventListener('change', calcularTudo);
        }
    });

    // Init
    validarMinutos();
    window.onload = function() {
        carregarDados();
        calcularTudo();
        updateFullscreenIcon();
    };
    window.addEventListener('beforeunload', salvarDados);
</script>
</body>
</html>
